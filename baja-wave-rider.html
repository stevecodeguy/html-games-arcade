<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baja Wave Rider</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0A0E27; touch-action: none; font-family: 'Inter', sans-serif; }
  canvas { display: block; }

  #hud {
    position: fixed; top: 0; left: 0; width: 100%; z-index: 10;
    pointer-events: none; padding: 14px 24px;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .hud-box {
    background: rgba(10, 14, 39, 0.55);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(99, 255, 224, 0.18);
    border-radius: 14px; padding: 10px 18px;
    box-shadow: 0 0 20px rgba(99, 255, 224, 0.08);
  }
  .hud-label {
    font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700;
    color: #63FFE0; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2px;
  }
  .hud-value {
    font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900;
    color: #FFD700; text-shadow: 0 0 12px rgba(255,215,0,0.5);
  }
  .hud-value.speed { color: #FF6B35; text-shadow: 0 0 12px rgba(255,107,53,0.5); }
  #brandTag {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 10;
    pointer-events: none; font-family: 'Orbitron', sans-serif; font-size: 11px;
    font-weight: 700; color: #63FFE0; letter-spacing: 3px;
    text-shadow: 0 0 18px rgba(99,255,224,0.6); opacity: 0.7;
  }

  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(10, 14, 39, 0.92); color: #F0F8FF; text-align: center;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    font-family: 'Orbitron', sans-serif; font-size: 48px; font-weight: 900;
    color: #63FFE0; text-shadow: 0 0 30px #63FFE0, 0 0 60px rgba(99,255,224,0.3);
    margin-bottom: 6px;
  }
  #overlay h2 {
    font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 400;
    color: #FF6B35; letter-spacing: 4px; margin-bottom: 24px;
  }
  #overlay p { font-size: 15px; color: #8892b0; margin: 4px 0; }
  .score-display {
    font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900;
    color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.5); margin: 14px 0;
  }
  #overlay button {
    margin-top: 22px; padding: 16px 48px; font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(135deg, #63FFE0, #8B5CF6); color: #0A0E27;
    border: none; border-radius: 50px; cursor: pointer; pointer-events: all;
    box-shadow: 0 0 30px rgba(99,255,224,0.35); transition: transform 0.15s, box-shadow 0.15s;
  }
  #overlay button:hover { transform: scale(1.06); box-shadow: 0 0 40px rgba(99,255,224,0.5); }
  button#timePrev {
    margin-top: 0px;
    padding: 0px 30px;
  }
  button#timeNext {
    margin-top: 0px;
    padding: 0px 30px;
  }
  .controls-box {
    margin-top: 20px; font-size: 12px; color: #5a6080; line-height: 2;
    background: rgba(99,255,224,0.04); border: 1px solid rgba(99,255,224,0.1);
    border-radius: 12px; padding: 12px 24px;
  }
  .controls-box kbd {
    background: rgba(99,255,224,0.12); color: #63FFE0; padding: 2px 8px;
    border-radius: 4px; font-family: 'Orbitron', sans-serif; font-size: 10px;
  }
  .time-picker { margin-top: 14px; }
  .time-picker .time-label {
    font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700;
    color: #63FFE0; letter-spacing: 3px; margin-bottom: 8px;
  }
  .time-spinner {
    display: inline-flex; align-items: center; gap: 14px;
    background: rgba(99, 255, 224, 0.06);
    border: 1px solid rgba(99, 255, 224, 0.22);
    border-radius: 30px; padding: 6px 14px;
  }
  .time-spinner button {
    pointer-events: all;
    width: 30px; height: 30px;
    border: none; background: rgba(99,255,224,0.14); color: #63FFE0;
    border-radius: 50%; font-size: 12px; cursor: pointer; line-height: 1;
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    transition: background 0.15s;
  }
  .time-spinner button:hover { background: rgba(99,255,224,0.28); }
  .time-spinner #timeValue {
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 15px;
    color: #FFD700; letter-spacing: 2px; min-width: 110px; text-align: center;
  }
</style>
</head>
<body>

<div id="hud">
  <div class="hud-box">
    <div class="hud-label">Score</div>
    <div class="hud-value" id="scoreVal">0</div>
  </div>
</div>

<div id="overlay">
  <h1>Baja Wave Rider</h1>
  <h2>SURF THE CRESTS</h2>
  <div id="finalScore" class="score-display"></div>
  <p id="finalDist"></p>
  <div class="time-picker">
    <div class="time-label">TIME OF DAY</div>
    <div class="time-spinner">
      <button id="timePrev" type="button">&#9664;</button>
      <span id="timeValue">TWILIGHT</span>
      <button id="timeNext" type="button">&#9654;</button>
    </div>
  </div>
  <button id="startBtn">START SURFING</button>
  <div class="controls-box">
    <kbd>SPACE</kbd> / <kbd>TAB</kbd> / <kbd>UP</kbd> Jump on waves<br>
    Higher on wave = higher jump &nbsp; | &nbsp; Hold = full height &nbsp; | &nbsp; Touch supported
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="data/palette.js"></script>
<script>
// ============================================================
// BAJA WAVE RIDER - Crest-Jump Physics Edition
// Pure Canvas 2D - no dependencies
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// The game's draw and physics code uses LOGICAL pixels with a fixed height
// (REF_H). Each frame the canvas is scaled by `uiScale` so logical units map
// to physical pixels. This keeps sprites and physics looking the same in
// portrait or landscape — only the logical width changes with aspect ratio.
const REF_H = 800;
// Surfer's screen X is a constant in logical pixels (independent of W) so
// rotation doesn't reposition the surfer or trigger any compensating shifts.
const SURFER_X = 110;
let W, H, WAVE_BASELINE, GRAVITY, JUMP_VEL, uiScale = 1;
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  uiScale = canvas.height / REF_H;
  H = REF_H;
  W = canvas.width / uiScale;
  WAVE_BASELINE = H * 0.93;
  const jumpHeight = H * 0.75;
  const JUMP_TIME = 1.4;
  GRAVITY = 8 * jumpHeight / (JUMP_TIME * JUMP_TIME);
  JUMP_VEL = GRAVITY * JUMP_TIME / 2;
}
resize();
window.addEventListener('resize', resize);
// On phones, orientationchange fires before innerWidth/innerHeight update.
// Re-run after a short delay so the canvas catches the post-rotation size.
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

// --- Palette: defined in data/palette.js, loaded via <script> tag above ---
let PALETTE = window.PALETTE;
const TIMES_OF_DAY = ['morning', 'noon', 'afternoon', 'twilight', 'night'];
let timeOfDay = 'twilight';

function applyStops(grad, stops) {
  stops.forEach(s => grad.addColorStop(s.stop, s.color));
}

// --- Brand Colors ---
const BAJA = '#63FFE0';
const TEAL = '#00CED1';
const ORANGE = '#FF6B35';
const PURPLE = '#8B5CF6';
const GOLD = '#FFD700';

// --- Sprite Assets ---
const SPRITES = {};
const SPRITE_FILES = {
  sun: 'sun.png', moon: 'moon.png', cloud: 'cloud.png',
  beach: 'palm-0.png', 'beach-1': 'palm-1.png', 'beach-2': 'palm-2.png',
  'person-0': 'person-0.png', 'person-1': 'person-1.png', 'person-2': 'person-2.png',
  'person-3': 'person-3.png', 'person-4': 'person-4.png',
  'umbrella-red': 'umbrella-red.png', 'umbrella-blue': 'umbrella-blue.png',
  'umbrella-yellow': 'umbrella-yellow.png', 'umbrella-green': 'umbrella-green.png',
  'towel-orange': 'starfish.png', 'towel-purple': 'sand-castle.png', 'towel-teal': 'beach-ball.png',
  'surfer-stand': 'surfer-stand.png', 'surfer-jump': 'surfer-jump.png',
  cooler: 'cooler.png',
  'seagull-incoming': 'seagull-incoming.png',
  'obstacle-0': 'obstacle-0.png', 'obstacle-1': 'obstacle-1.png', 'obstacle-2': 'obstacle-2.png',
  'collectable-0': 'collectable-0.png', 'collectable-1': 'collectable-1.png',
  'air-obstacle-0': 'air-obstacle-0.png', 'air-obstacle-1': 'air-obstacle-1.png',
  wave: 'wave.png',
};
const SPRITE_META = {};
const SPRITE_DIR = 'images/baja-wave-rider/';
function detectSheet(key, img, filename) {
  // Filename ending in -Nf.png (e.g., "bird-4f.png") → N horizontal frames
  const m = filename.match(/-(\d+)f\.png$/i);
  if (m) {
    const n = parseInt(m[1], 10);
    if (n > 1 && img.naturalWidth % n === 0) {
      SPRITE_META[key] = { frames: n, fw: img.naturalWidth / n, fh: img.naturalHeight };
      return;
    }
  }
  // Aspect heuristic: width/height is a clean integer >= 2 → N square frames
  const ratio = img.naturalWidth / img.naturalHeight;
  const rounded = Math.round(ratio);
  if (rounded >= 2 && Math.abs(ratio - rounded) < 0.02) {
    SPRITE_META[key] = { frames: rounded, fw: img.naturalWidth / rounded, fh: img.naturalHeight };
    return;
  }
  SPRITE_META[key] = { frames: 1, fw: img.naturalWidth, fh: img.naturalHeight };
}
// Try <filename>.png first; fallback to animated-<filename>.png
function loadSprite(key, filename) {
  const img = new Image();
  SPRITES[key] = img;
  img.onload = () => detectSheet(key, img, filename);
  img.onerror = () => {
    const fbName = 'animated-' + filename;
    const img2 = new Image();
    SPRITES[key] = img2;
    img2.onload = () => detectSheet(key, img2, fbName);
    img2.onerror = () => console.warn('Sprite not found:', filename, 'or', fbName);
    img2.src = SPRITE_DIR + fbName;
  };
  img.src = SPRITE_DIR + filename;
}
for (const [k, f] of Object.entries(SPRITE_FILES)) {
  loadSprite(k, f);
}
function spriteReady(img) { return img && img.complete && img.naturalWidth > 0; }

// --- Game State ---
let gameState = 'start';
let score = 0, distance = 0, speed = 1.0, time = 0, bonusScore = 0;
let waveOffset = 0;
let lastMilestone = 0;

// Surfer
let surferX = 0, surferY = 0, surferVY = 0;
let isJumping = false;
let canJump = false; // true when on the ramp/peak
let surferAngle = 0;
let surferTrail = [];

// Hold-for-height jump: tap = small hop, hold = full jump
let jumpKeyHeld = false;    // is the jump key currently pressed
const JUMP_CUT = 0.45;     // velocity multiplier when releasing early

// Screen shake
let shakeIntensity = 0;
function triggerShake(intensity) { shakeIntensity = Math.max(shakeIntensity, intensity); }
function getShakeOffset() {
  if (shakeIntensity > 0.3) {
    const ox = (Math.random() - 0.5) * shakeIntensity;
    const oy = (Math.random() - 0.5) * shakeIntensity;
    shakeIntensity *= 0.88;
    return { x: ox, y: oy };
  }
  shakeIntensity = 0;
  return { x: 0, y: 0 };
}

// Obstacles & Collectibles
let obstacles = [];
let collectibles = [];
let obstacleTimer = 0, collectibleTimer = 0;

// Particles
let particles = [];
let speedLines = [];
let popups = [];

// Near miss
let nearMissTimer = 0;

// Flash overlay
let flashColor = null, flashTimer = 0;

// Jump buffer - player pressed jump, waiting for next crest
let jumpBufferTimer = 0;
const JUMP_BUFFER_TIME = 0.5;

// Stars (background)
const stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random(), y: Math.random() * 0.7,
    r: 0.5 + Math.random() * 1.5,
    twinkleSpeed: 1 + Math.random() * 3,
    twinklePhase: Math.random() * Math.PI * 2,
    brightness: 0.3 + Math.random() * 0.7
  });
}

// Clouds
let clouds = [];
for (let i = 0; i < 10; i++) {
  clouds.push({
    x: Math.random() * 2 - 0.5,
    y: 0.06 + Math.random() * 0.15,
    w: 60 + Math.random() * 120,
    h: 20 + Math.random() * 30,
    speed: 0.01 + Math.random() * 0.01,
    opacity: 0.05 + Math.random() * 0.06
  });
}

// Distant wave offsets
let distantWaveOffset = 0;

// ============================================================
// WAVE SURFACE - Triangle waves with straight sides
// Linear ramp up → sharp peak → steep linear drop
// ============================================================

const WAVE_PERIOD = 491;
const WAVE_AMP = 0.14; // fraction of H
const RAMP_FRAC = 0.55;  // ramp takes 55% of period
const DROP_FRAC = 0.28;  // drop takes 28% of period
const FLAT_FRAC = 0.17;  // flat trough takes 17%

function triangleShape(t) {
  // t: 0..1 phase within one wave period
  // Returns 0..1 normalized height (0=trough, 1=peak)
  if (t < RAMP_FRAC) {
    // Straight ramp up
    return t / RAMP_FRAC;
  } else if (t < RAMP_FRAC + DROP_FRAC) {
    // Straight steep drop
    const s = (t - RAMP_FRAC) / DROP_FRAC;
    return 1.0 - s;
  } else {
    // Flat trough at bottom
    return 0;
  }
}

function getWavePhase(x) {
  const wx = x + waveOffset;
  return (((wx % WAVE_PERIOD) + WAVE_PERIOD) % WAVE_PERIOD) / WAVE_PERIOD;
}

// Returns 0..1: how far up the wave the surfer is (0=trough, 1=peak)
function getWaveHeight(x) {
  return triangleShape(getWavePhase(x));
}

function getWaveY(x) {
  const wx = x + waveOffset;
  const phase = (((wx % WAVE_PERIOD) + WAVE_PERIOD) % WAVE_PERIOD) / WAVE_PERIOD;
  let y = triangleShape(phase) * (H * WAVE_AMP);
  // Tiny ripple for organic feel (very subtle so lines stay straight)
  y += Math.sin(wx * 0.08 + 3.0) * (H * 0.0015);
  return WAVE_BASELINE - y;
}

function getWaveSlope(x) {
  return getWaveY(x + 4) - getWaveY(x - 4);
}

// Can jump anywhere on the wave — power scales with height
function canJumpHere(x) {
  return true;
}

// Returns 0..1 for how close to the peak (used for visual indicator)
function getCrestness(x) {
  const phase = getWavePhase(x);
  if (phase > RAMP_FRAC - 0.12 && phase < RAMP_FRAC + 0.04) {
    const dist = Math.abs(phase - RAMP_FRAC);
    return Math.max(0, 1 - dist / 0.12);
  }
  return 0;
}

// Jump power based on wave position: higher on wave = more power
function getJumpPower(x) {
  const h = getWaveHeight(x);
  const MIN_POWER = 0.65; // jumping from bottom of ramp gives 70% power (doubled); tip caps at 100%
  return MIN_POWER + (1 - MIN_POWER) * h;
}

// Find screen X positions of wave peaks (ramp→drop transition)
function getCurlPositions() {
  const positions = [];
  const peakPhase = RAMP_FRAC;
  const rawX = peakPhase * WAVE_PERIOD - (waveOffset % WAVE_PERIOD);
  const startX = ((rawX % WAVE_PERIOD) + WAVE_PERIOD) % WAVE_PERIOD;
  for (let x = startX; x < W + 50; x += WAVE_PERIOD) {
    positions.push({ x, y: getWaveY(x) });
  }
  return positions;
}

// ============================================================
// DRAW FUNCTIONS
// ============================================================

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, WAVE_BASELINE);
  const stops = (PALETTE.sky && PALETTE.sky[timeOfDay]) || PALETTE.sky.twilight;
  applyStops(grad, stops);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, WAVE_BASELINE);
}

function drawStars() {
  // Stars only make sense against a dark sky
  if (timeOfDay !== 'twilight' && timeOfDay !== 'night') return;
  // Only draw stars in the upper dark portion of sky
  stars.forEach(s => {
    if (s.y > 0.3) return; // skip stars below the dark zone
    const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(time * s.twinkleSpeed + s.twinklePhase));
    ctx.fillStyle = `rgba(255, 255, 255, ${s.brightness * twinkle * 0.6})`;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawMoon() {
  const sx = W * 0.75, sy = H * 0.18, sr = H * 0.1;
  const img = SPRITES.moon;
  if (!spriteReady(img)) return;
  const scale = sr / 80;
  const w = img.width * scale, h = img.height * scale;
  ctx.drawImage(img, sx - w / 2, sy - h / 2, w, h);
}

function drawSun() {
  const sx = W * 0.75, sy = H * 0.18, sr = H * 0.1;
  const img = SPRITES.sun;
  if (spriteReady(img)) {
    const scale = sr / 80;
    const w = img.width * scale, h = img.height * scale;
    ctx.drawImage(img, sx - w / 2, sy - h / 2, w, h);
    return;
  }
  // Fallback procedural draw (unreached once sprite loads)
  const glow = ctx.createRadialGradient(sx, sy, sr * 0.3, sx, sy, sr * 3.5);
  glow.addColorStop(0, 'rgba(255, 230, 100, 0.45)');
  glow.addColorStop(0.3, 'rgba(255, 200, 50, 0.2)');
  glow.addColorStop(0.6, 'rgba(255, 160, 40, 0.08)');
  glow.addColorStop(1, 'rgba(255, 100, 30, 0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(sx, sy, sr * 3.5, 0, Math.PI * 2);
  ctx.fill();

  // Rays - cartoony spikes
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(time * 0.15); // slow spin
  const rayCount = 12;
  for (let i = 0; i < rayCount; i++) {
    const angle = (i / rayCount) * Math.PI * 2;
    const inner = sr * 1.05;
    const outer = sr * 1.5 + Math.sin(time * 2 + i) * sr * 0.15;
    const halfWidth = 0.12;
    ctx.fillStyle = 'rgba(255, 220, 80, 0.5)';
    ctx.beginPath();
    ctx.moveTo(Math.cos(angle - halfWidth) * inner, Math.sin(angle - halfWidth) * inner);
    ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
    ctx.lineTo(Math.cos(angle + halfWidth) * inner, Math.sin(angle + halfWidth) * inner);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  // Sun body - gradient circle
  const sunGrad = ctx.createRadialGradient(sx - sr * 0.15, sy - sr * 0.15, sr * 0.1, sx, sy, sr);
  sunGrad.addColorStop(0, '#FFFDE0');
  sunGrad.addColorStop(0.4, '#FFE44D');
  sunGrad.addColorStop(0.8, '#FFB830');
  sunGrad.addColorStop(1, '#FF8C00');
  ctx.fillStyle = sunGrad;
  ctx.beginPath();
  ctx.arc(sx, sy, sr, 0, Math.PI * 2);
  ctx.fill();

  // Cartoony face - sunglasses
  ctx.fillStyle = '#333';
  // Left lens
  ctx.beginPath();
  ctx.ellipse(sx - sr * 0.28, sy - sr * 0.05, sr * 0.22, sr * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();
  // Right lens
  ctx.beginPath();
  ctx.ellipse(sx + sr * 0.28, sy - sr * 0.05, sr * 0.22, sr * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();
  // Bridge
  ctx.strokeStyle = '#333';
  ctx.lineWidth = sr * 0.06;
  ctx.beginPath();
  ctx.moveTo(sx - sr * 0.08, sy - sr * 0.05);
  ctx.lineTo(sx + sr * 0.08, sy - sr * 0.05);
  ctx.stroke();
  // Lens shine
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.ellipse(sx - sr * 0.2, sy - sr * 0.12, sr * 0.08, sr * 0.06, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(sx + sr * 0.35, sy - sr * 0.12, sr * 0.08, sr * 0.06, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Big smile
  ctx.strokeStyle = '#CC6600';
  ctx.lineWidth = sr * 0.05;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(sx, sy + sr * 0.05, sr * 0.35, 0.2, Math.PI - 0.2);
  ctx.stroke();
}

function drawClouds() {
  const img = SPRITES.cloud;
  if (!spriteReady(img)) return;
  clouds.forEach(c => {
    const cx = c.x * W, cy = c.y * H;
    const sx = c.w / 120, sy = c.h / 40;
    const w = img.width * sx, h = img.height * sy;
    ctx.globalAlpha = c.opacity + 0.05;
    ctx.drawImage(img, cx - w / 2, cy - h / 2, w, h);
    ctx.globalAlpha = 1;
  });
}

// ============================================================
// BEACH BACKGROUND - scrolling beach with palm trees & people
// ============================================================

const beachItems = [];
const PALM_VARIANTS = ['beach', 'beach-1', 'beach-2'];
function pickPalmVariant() {
  return PALM_VARIANTS[Math.floor(Math.random() * PALM_VARIANTS.length)];
}
// Density rule: max 3 items in any 250px window. Items can cluster (down to
// BEACH_MIN_GAP apart) but the window check prevents the background from
// getting crowded on phones.
const BEACH_DENSITY_WINDOW = 450;
const BEACH_DENSITY_MAX = 3;
const BEACH_MIN_GAP = 30;
function makeBeachItem(bx) {
  const roll = Math.random();
  if (roll < 0.4) {
    return { type: 'palm', x: bx, h: 120 + Math.random() * 80, lean: (Math.random() - 0.5) * 0.35, variant: pickPalmVariant() };
  } else if (roll < 0.58) {
    return { type: 'person', x: bx, variant: 'person-' + Math.floor(Math.random() * 5) };
  } else if (roll < 0.72) {
    return { type: 'umbrella', x: bx, variant: 'umbrella-' + ['red','blue','yellow','green'][Math.floor(Math.random()*4)] };
  } else if (roll < 0.9) {
    return { type: 'towel', x: bx, variant: 'towel-' + ['orange','purple','teal'][Math.floor(Math.random()*3)] };
  }
  return { type: 'cooler', x: bx, variant: 'cooler' };
}
function initBeach() {
  beachItems.push({ type: 'palm', x: W * 0.18, h: 190, lean: -0.08, variant: pickPalmVariant() });
  beachItems.push({ type: 'palm', x: W * 0.72, h: 165, lean: 0.14, variant: pickPalmVariant() });
  // Fill with windowed-density rejection sampling so items can cluster
  // (1-3 within 250px) without the overall background getting crowded.
  const stripWidth = W * 3;
  const half = BEACH_DENSITY_WINDOW / 2;
  const targetCount = Math.floor(stripWidth / 90); // upper bound; rejection thins it
  let attempts = 0;
  while (beachItems.length < targetCount && attempts < targetCount * 12) {
    attempts++;
    const bx = Math.random() * stripWidth;
    let neighbors = 0, tooClose = false;
    for (const item of beachItems) {
      const d = Math.abs(item.x - bx);
      if (d < BEACH_MIN_GAP) { tooClose = true; break; }
      if (d < half) neighbors++;
    }
    if (!tooClose && neighbors < BEACH_DENSITY_MAX) {
      beachItems.push(makeBeachItem(bx));
    }
  }
}
initBeach();

let beachDuneOffset = 0;

function getBeachDuneY(x) {
  // Rolling sandy hills
  const dx = x + beachDuneOffset;
  let y = Math.sin(dx * 0.004) * (H * 0.05);
  y += Math.sin(dx * 0.009 + 1.2) * (H * 0.03);
  y += Math.sin(dx * 0.018 + 2.5) * (H * 0.012);
  return y;
}

function drawBeach(scrollSpeed, dt) {
  const beachH = H * 0.4;
  const beachY = WAVE_BASELINE - beachH + H * 0.02;
  const parallaxSpeed = scrollSpeed * 0.15;
  beachDuneOffset += parallaxSpeed * dt;

  // Sandy hills - filled with gradient, shaped by dune function
  const sandGrad = ctx.createLinearGradient(0, beachY, 0, beachY + beachH);
  applyStops(sandGrad, (PALETTE.sand && PALETTE.sand.back) || []);
  ctx.fillStyle = sandGrad;
  ctx.beginPath();
  ctx.moveTo(0, beachY + beachH + 10);
  for (let x = 0; x <= W; x += 4) {
    const duneY = beachY + beachH * 0.35 + getBeachDuneY(x);
    ctx.lineTo(x, duneY);
  }
  ctx.lineTo(W, beachY + beachH + 10);
  ctx.closePath();
  ctx.fill();

  // Second dune layer (foreground, darker, slightly offset)
  const sandGrad2 = ctx.createLinearGradient(0, beachY + beachH * 0.4, 0, beachY + beachH);
  applyStops(sandGrad2, (PALETTE.sand && PALETTE.sand.front) || []);
  ctx.fillStyle = sandGrad2;
  ctx.beginPath();
  ctx.moveTo(0, beachY + beachH + 10);
  for (let x = 0; x <= W; x += 4) {
    const duneY = beachY + beachH * 0.55 + getBeachDuneY(x + 200) * 0.7;
    ctx.lineTo(x, duneY);
  }
  ctx.lineTo(W, beachY + beachH + 10);
  ctx.closePath();
  ctx.fill();

  // Update and draw items on the dunes
  beachItems.forEach(item => {
    item.x -= parallaxSpeed * dt;
    if (item.x < -120) item.x += W * 3 + 120;
    if (item.x < -100 || item.x > W + 100) return;

    // Items sit on the foreground dune surface
    const duneY = beachY + beachH * 0.55 + getBeachDuneY(item.x + 200) * 0.7;

    if (item.type === 'palm') {
      drawPalmTree(item.variant, item.x, duneY, item.h, item.lean);
    } else {
      drawSpriteVariant(item.variant, item.x, duneY);
    }
  });
}

// Anchor offsets (in px within each PNG) where the sprite's local (0,0) sits.
// Defaults: standing/grounded sprites pin to bottom-center; floating sprites pin to center.
const SPRITE_ANCHORS = {
  // palms (226x220, 168x220, 200x220) — bottom-center, baseH = full image height
  beach:         { ax: 113, ay: 220, baseH: 220 },
  'beach-1':     { ax: 84,  ay: 220, baseH: 220 },
  'beach-2':     { ax: 100, ay: 220, baseH: 220 },
  // people (90x60 for person-0, 90x90 for the rest) — bottom-center
  'person-0':    { ax: 45, ay: 60 },
  'person-1':    { ax: 45, ay: 90 },
  'person-2':    { ax: 45, ay: 90 },
  'person-3':    { ax: 45, ay: 90 },
  'person-4':    { ax: 45, ay: 90 },
  // umbrellas (140x140) — bottom-center
  'umbrella-red':    { ax: 70, ay: 140 },
  'umbrella-blue':   { ax: 70, ay: 140 },
  'umbrella-yellow': { ax: 70, ay: 140 },
  'umbrella-green':  { ax: 70, ay: 140 },
  // towel slots now hold starfish (30x21), sand-castle (60x70), beach-ball (60x60)
  'towel-orange': { ax: 15, ay: 21 },
  'towel-purple': { ax: 30, ay: 70 },
  'towel-teal':   { ax: 30, ay: 60 },
  // surfer (120x110) — kept at the original pivot since physics references it
  'surfer-stand': { ax: 60, ay: 72 },
  'surfer-jump':  { ax: 60, ay: 72 },
  cooler:             { ax: 35, ay: 77 },   // 70x77
  'seagull-incoming': { ax: 50, ay: 50 },   // 100x100 (centered)
  // wave-surface obstacles — bottom-center
  'obstacle-0': { ax: 85, ay: 140 },        // 170x140
  'obstacle-1': { ax: 56, ay: 120 },        // 112x120
  'obstacle-2': { ax: 83, ay: 220 },        // 167x220
  // floating collectables — centered
  'collectable-0': { ax: 50, ay: 40 },      // 100x80
  'collectable-1': { ax: 50, ay: 30 },      // 100x59
  // air obstacles: anchor auto-computed per frame (sheet, varies)
};
function getAnchor(key) {
  const a = SPRITE_ANCHORS[key];
  if (a) return a;
  const meta = SPRITE_META[key];
  if (meta) return { ax: meta.fw / 2, ay: meta.fh / 2 };
  return null;
}

function drawSpriteVariant(key, x, y, phase) {
  const img = SPRITES[key];
  const meta = SPRITE_META[key];
  const a = getAnchor(key);
  if (!spriteReady(img) || !meta || !a) return;
  if (meta.frames > 1) {
    const p = phase !== undefined ? phase : time;
    const f = Math.floor(p * meta.frames / (Math.PI * 2)) % meta.frames;
    const frame = (f + meta.frames) % meta.frames;
    ctx.drawImage(img,
      frame * meta.fw, 0, meta.fw, meta.fh,
      x - a.ax, y - a.ay, meta.fw, meta.fh);
  } else {
    ctx.drawImage(img, x - a.ax, y - a.ay);
  }
}

function drawPalmTree(variant, x, y, h, lean) {
  const key = variant || 'beach-1';
  const img = SPRITES[key];
  const a = SPRITE_ANCHORS[key];
  if (!spriteReady(img) || !a) return;
  const scale = h / a.baseH;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(lean * 0.3);
  ctx.scale(scale, scale);
  ctx.drawImage(img, -a.ax, -a.ay);
  ctx.restore();
}

function drawDistantWaves() {
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#1565C0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let x = 0; x <= W; x += 4) {
    const wx = x + distantWaveOffset;
    const y = WAVE_BASELINE - H * 0.1 + Math.sin(wx * 0.004) * 10 + Math.sin(wx * 0.012) * 5;
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// ============================================================
// WAVE DRAWING - Triangle waves with white crests
// ============================================================

const WAVE_TILE_REF_AMP = 80;
const WAVE_TILE_H = 160;

function drawWave() {
  const amp = H * WAVE_AMP;
  const img = SPRITES.wave;
  if (spriteReady(img)) {
    const scaleY = amp / WAVE_TILE_REF_AMP;
    const tileH = WAVE_TILE_H * scaleY;
    const tileTop = WAVE_BASELINE - amp;
    const offset = ((waveOffset % WAVE_PERIOD) + WAVE_PERIOD) % WAVE_PERIOD;
    // +1 overlap + integer x avoids subpixel seam between tiles
    for (let sx = -offset; sx < W; sx += WAVE_PERIOD) {
      ctx.drawImage(img, Math.floor(sx), Math.floor(tileTop), WAVE_PERIOD + 1, Math.ceil(tileH));
    }
    return;
  }

  const waveTop = WAVE_BASELINE - amp;

  // Fallback procedural render (sprite not loaded yet)
  const bodyGrad = ctx.createLinearGradient(0, waveTop, 0, H);
  bodyGrad.addColorStop(0, 'rgba(235, 250, 255, 0.95)');  // white/foam at crest
  bodyGrad.addColorStop(0.08, 'rgba(180, 240, 240, 0.9)'); // pale teal
  bodyGrad.addColorStop(0.2, 'rgba(0, 190, 200, 0.8)');    // bright teal
  bodyGrad.addColorStop(0.4, 'rgba(0, 120, 150, 0.7)');    // mid teal
  bodyGrad.addColorStop(0.65, 'rgba(0, 70, 110, 0.85)');   // deep blue
  bodyGrad.addColorStop(1, '#002244');                      // abyss
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 3) ctx.lineTo(x, getWaveY(x));
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();

  // Surface line - subtle glow
  ctx.strokeStyle = 'rgba(220, 250, 255, 0.6)';
  ctx.lineWidth = 2;
  ctx.shadowColor = 'rgba(99, 255, 224, 0.5)';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  for (let x = 0; x <= W; x += 3) {
    const y = getWaveY(x);
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Subtle foam dots along upper ramp
  for (let x = 0; x < W; x += 26) {
    const phase = getWavePhase(x);
    if (phase > 0.2 && phase < RAMP_FRAC) {
      const y = getWaveY(x);
      const alpha = 0.08 + 0.05 * Math.sin(x * 0.05 + time * 3);
      ctx.fillStyle = `rgba(240, 248, 255, ${alpha})`;
      ctx.beginPath();
      ctx.arc(x, y + 3, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ============================================================
// JUMP INDICATOR - Shows when player can jump
// ============================================================

function drawJumpIndicator() {
  if (isJumping || gameState !== 'playing') return;
  if (!canJump) return;

  const power = getJumpPower(surferX); // 0.25..1
  const pulse = 0.7 + 0.3 * Math.sin(time * 8);

  ctx.save();

  // Glow intensity scales with jump power
  ctx.fillStyle = `rgba(99, 255, 224, ${power * pulse * 0.15})`;
  ctx.beginPath();
  ctx.arc(surferX, surferY - 10, 35 + power * 15, 0, Math.PI * 2);
  ctx.fill();

  // Arrow - size scales with power
  const arrowScale = 0.5 + power * 0.5;
  const arrowY = surferY - 70 - Math.sin(time * 6) * 4;
  ctx.fillStyle = `rgba(99, 255, 224, ${power * pulse * 0.9})`;
  ctx.beginPath();
  ctx.moveTo(surferX, arrowY - 12 * arrowScale);
  ctx.lineTo(surferX - 8 * arrowScale, arrowY);
  ctx.lineTo(surferX - 3 * arrowScale, arrowY);
  ctx.lineTo(surferX - 3 * arrowScale, arrowY + 8 * arrowScale);
  ctx.lineTo(surferX + 3 * arrowScale, arrowY + 8 * arrowScale);
  ctx.lineTo(surferX + 3 * arrowScale, arrowY);
  ctx.lineTo(surferX + 8 * arrowScale, arrowY);
  ctx.closePath();
  ctx.fill();

  // Power percentage text
  const pct = Math.round(power * 100);
  ctx.font = "bold 10px 'Orbitron', sans-serif";
  ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(99, 255, 224, ${power * pulse * 0.75})`;
  ctx.fillText(pct + '%', surferX, arrowY - 14 * arrowScale);

  ctx.restore();
}

function drawSurferTrail() {

// ============================================================
// OBSTACLES - All positioned above wave line
// ============================================================

// Snap an absolute world X to the lower half of the drop side of a wave.
function snapAbsToDropSide(absX) {
  const phase = (((absX % WAVE_PERIOD) + WAVE_PERIOD) % WAVE_PERIOD) / WAVE_PERIOD;
  const dropMid = RAMP_FRAC + DROP_FRAC * 0.5;
  const dropEnd = RAMP_FRAC + DROP_FRAC;
  if (phase >= dropMid && phase < dropEnd) return absX;
  const targetPhase = dropMid + Math.random() * (DROP_FRAC * 0.45);
  const phaseDiff = ((targetPhase - phase) % 1 + 1) % 1;
  return absX + phaseDiff * WAVE_PERIOD;
}

// Keep at least this much horizontal space between any two obstacles/collectables.
const ITEM_MIN_SPACING = 100;
function tooCloseToOthersAbs(absX) {
  for (const ob of obstacles) if (Math.abs(ob.absX - absX) < ITEM_MIN_SPACING) return true;
  for (const c of collectibles) if (Math.abs(c.absX - absX) < ITEM_MIN_SPACING) return true;
  return false;
}

// Dimensions match the sprite PNGs; hitbox = 70% of image, centered on image.
// `sink` = fraction of image height that sits below the wave line (0 = floating, 1 = fully submerged).
const OBSTACLE_TYPES = [
  { kind: 'obstacle-0', w: 170, h: 140, weight: 0.40, sink: 0.45 },
  { kind: 'obstacle-1', w: 112, h: 120, weight: 0.35, sink: 0.60 },
  { kind: 'obstacle-2', w: 167, h: 220, weight: 0.25, sink: 0.45 },
];
const OBSTACLE_BY_KIND = Object.fromEntries(OBSTACLE_TYPES.map(t => [t.kind, t]));

// Index of the wave that received the most recent obstacle. We refuse to
// spawn on the wave directly after it, so obstacle waves are never adjacent.
let lastObstacleWaveIndex = -Infinity;
// Cursor that always points to the next absolute X we'll consider for an
// obstacle spawn. We pre-generate up to GENERATION_AHEAD beyond waveOffset so
// rotation never causes obstacles to pop in or out.
const GENERATION_AHEAD = 2500;
let obstacleSpawnCursor = 0;
let collectibleSpawnCursor = 0;

function tryCreateObstacleAt(rawAbsX) {
  const absX = snapAbsToDropSide(rawAbsX);
  const waveIndex = Math.floor(absX / WAVE_PERIOD);
  if (waveIndex === lastObstacleWaveIndex + 1) return false;
  if (tooCloseToOthersAbs(absX)) return false;
  const r = Math.random();
  let acc = 0, def = OBSTACLE_TYPES[OBSTACLE_TYPES.length - 1];
  for (const t of OBSTACLE_TYPES) { acc += t.weight; if (r < acc) { def = t; break; } }
  obstacles.push({
    kind: def.kind,
    absX,
    worldX: absX - waveOffset, // derived; refreshed each frame
    heightAboveWave: 0,
    imgW: def.w, imgH: def.h,
    hitW: def.w * 0.85, hitH: def.h * 0.85,
    bobPhase: Math.random() * Math.PI * 2
  });
  lastObstacleWaveIndex = waveIndex;
  return true;
}

// Step the spawn cursor forward and try to drop obstacles until we've
// pre-populated GENERATION_AHEAD beyond the current scroll position.
function generateObstaclesAhead() {
  const target = waveOffset + GENERATION_AHEAD;
  let safety = 100;
  while (obstacleSpawnCursor < target && safety-- > 0) {
    obstacleSpawnCursor += 180 + Math.random() * 220; // average gap ≈ 290
    tryCreateObstacleAt(obstacleSpawnCursor);
  }
}


// ============================================================
// COLLECTIBLES - Mountain Dew cans above wave
// ============================================================

// dewcan = collectable-0 (100x80), starfish = collectable-1 (100x59)
const COLLECTABLE_DIMS = { dewcan: { w: 100, h: 80 }, starfish: { w: 100, h: 59 } };

function tryCreateCollectibleAt(absX) {
  if (tooCloseToOthersAbs(absX)) return false;
  const isStarfish = Math.random() < 0.28;
  const kind = isStarfish ? 'starfish' : 'dewcan';
  const d = COLLECTABLE_DIMS[kind];
  collectibles.push({
    kind,
    value: isStarfish ? 100 : 50,
    absX,
    worldX: absX - waveOffset,
    heightAboveWave: H * 0.1 + Math.random() * H * 0.5,
    collected: false, collectAnim: 0,
    rot: 0,
    pulsePhase: Math.random() * Math.PI * 2,
    hitW: d.w, hitH: d.h
  });
  return true;
}

function generateCollectiblesAhead() {
  const target = waveOffset + GENERATION_AHEAD;
  let safety = 100;
  while (collectibleSpawnCursor < target && safety-- > 0) {
    collectibleSpawnCursor += 220 + Math.random() * 320; // average gap ≈ 380
    tryCreateCollectibleAt(collectibleSpawnCursor);
  }
}

function drawStarfish(x, y, scale, pulse) {

function spawnParticles(x, y, count, color, spreadX, spreadY, life, grav) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * (spreadX || 150),
      vy: -(Math.random() * (spreadY || 150) + 30),
      life: life || (0.4 + Math.random() * 0.4),
      maxLife: life || 0.7,
      color: color || BAJA,
      r: 1.5 + Math.random() * 3,
      grav: grav !== undefined ? grav : 300
    });
  }
}

function spawnWaterSpray() {
  if (isJumping) return;
  const sprayCount = Math.floor(speed * 1.2);
  for (let i = 0; i < sprayCount; i++) {
    if (Math.random() < 0.3 * speed) {
      const sx = surferX + (Math.random() - 0.5) * 20;
      particles.push({
        x: sx, y: getWaveY(sx) - 2,
        vx: -30 - Math.random() * 40 * speed,
        vy: -(40 + Math.random() * 60 * speed),
        life: 0.2 + Math.random() * 0.15,
        maxLife: 0.35,
        color: Math.random() < 0.5 ? 'rgba(240,248,255,0.7)' : 'rgba(99,255,224,0.5)',
        r: 1 + Math.random() * 2,
        grav: 200
      });
    }
  }
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ============================================================
// SPEED LINES
// ============================================================

function updateSpeedLines(dt) {
  if (speed > 1.5) {
    const count = Math.floor((speed - 1.5) * 3);
    for (let i = 0; i < count; i++) {
      if (Math.random() < 0.4) {
        speedLines.push({
          x: W + 10,
          y: Math.random() * WAVE_BASELINE,
          len: 30 + Math.random() * 60 * speed,
          life: 0.2 + Math.random() * 0.2,
          maxLife: 0.3
        });
      }
    }
  }
  speedLines.forEach(l => { l.x -= 800 * speed * dt; l.life -= dt; });
  speedLines = speedLines.filter(l => l.life > 0);
}

function drawSpeedLines() {
  speedLines.forEach(l => {
    const alpha = (l.life / l.maxLife) * 0.25;
    ctx.strokeStyle = `rgba(99, 255, 224, ${alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(l.x + l.len, l.y);
    ctx.stroke();
  });
}

function createPopup(text, x, y, color) {

function drawPopups() {
  popups.forEach(p => {
    const t = 1 - p.life / p.maxLife;
    const alpha = 1 - t;

    ctx.scale(scale, scale);
    ctx.font = `900 ${p.size}px 'Orbitron', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 15;
    ctx.fillText(p.text, 0, 0);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  });
}

// ============================================================
// INPUT
// ============================================================

const keys = {};

function isJumpKey(code) {
  return code === 'Space' || code === 'ArrowUp' || code === 'Tab';
}

// Brief lockout after a crash so a held jump key doesn't immediately
// restart the game while the player is still reacting to the wipeout.
const RESTART_KEY_DELAY_MS = 2500;
let gameOverAt = 0;

window.addEventListener('keydown', e => {
  if (isJumpKey(e.code)) e.preventDefault();
  if (keys[e.code]) return; // ignore key repeat
  keys[e.code] = true;
  if (gameState === 'playing' && isJumpKey(e.code)) {
    jumpKeyHeld = true;
    attemptJump();
  } else if (gameState !== 'playing' && (e.code === 'Space' || e.code === 'Enter')) {
    if (gameState === 'gameover' && performance.now() - gameOverAt < RESTART_KEY_DELAY_MS) return;
    startGame();
  }
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (isJumpKey(e.code)) {
    // Release while jumping upward → cut velocity for shorter jump
    if (jumpKeyHeld && isJumping && surferVY < 0) {
      surferVY *= JUMP_CUT;
    }
    jumpKeyHeld = false;
  }
});

// Pointer input: tap/click = jump, hold = full height jump.
// Bound to canvas so taps on overlay buttons (start, time spinner) keep working.
canvas.style.touchAction = 'none';
canvas.addEventListener('pointerdown', e => {
  if (gameState !== 'playing') return;
  e.preventDefault();
  jumpKeyHeld = true;
  attemptJump();
});
const endJumpHold = () => {
  if (!jumpKeyHeld) return;
  if (isJumping && surferVY < 0) surferVY *= JUMP_CUT;
  jumpKeyHeld = false;
};
canvas.addEventListener('pointerup', endJumpHold);
canvas.addEventListener('pointercancel', endJumpHold);
canvas.addEventListener('pointerleave', endJumpHold);

let doubleJumpUsed = false;

function attemptJump() {
  if (!isJumping) doJump();
  else if (!doubleJumpUsed) doDoubleJump();
}

function doJump() {
  const power = getJumpPower(surferX); // 0.25 at trough, 1.0 at peak
  isJumping = true;
  doubleJumpUsed = false;
  surferVY = -JUMP_VEL * power * 0.9;
  // Splash scales with power
  const count = Math.floor(6 + 10 * power);
  spawnParticles(surferX, surferY + 5, count, 'rgba(240,248,255,0.8)', 80 + 60 * power, 70 + 50 * power, 0.5, 200);
  spawnParticles(surferX, surferY + 5, Math.floor(4 + 6 * power), BAJA, 60 + 40 * power, 50 + 40 * power, 0.4, 250);
  triggerShake(2 + 4 * power);
}

function doDoubleJump() {
  doubleJumpUsed = true;
  // Adds one max-power jump's velocity, but caps the resulting apex
  // at SCREEN_CEILING so the surfer never leaves the top of the screen.
  const SCREEN_CEILING = 20;
  const maxUpwardVY = Math.sqrt(2 * GRAVITY * Math.max(0, surferY - SCREEN_CEILING));
  surferVY = Math.max(surferVY - JUMP_VEL, -maxUpwardVY);
  spawnParticles(surferX, surferY + 5, 10, 'rgba(240,248,255,0.85)', 100, 70, 0.4, 200);
  spawnParticles(surferX, surferY + 5, 6, BAJA, 70, 50, 0.3, 250);
  triggerShake(3);
}

// ============================================================
// GAME FLOW
// ============================================================

function resetGame() {
  score = 0; distance = 0; speed = 1.0; time = 0; bonusScore = 0;
  waveOffset = 0; surferVY = 0; isJumping = false; doubleJumpUsed = false;
  jumpKeyHeld = false;
  obstacleTimer = 0; collectibleTimer = 0; lastMilestone = 0;
  lastObstacleWaveIndex = -Infinity;
  // Pre-gen cursors start a screen-width ahead of the surfer so the first
  // obstacles spawn off-screen right and scroll in.
  obstacleSpawnCursor = waveOffset + W;
  collectibleSpawnCursor = waveOffset + W;
  obstacles = []; collectibles = []; particles = [];
  seagulls = []; seagullTimer = 0; seagullWarnings = [];
  speedLines = []; surferTrail = []; popups = [];
  nearMissTimer = 0; flashColor = null; flashTimer = 0;
  jumpBufferTimer = 0; canJump = false;
}

function startGame() {
  resetGame();
  gameState = 'playing';
  document.getElementById('overlay').classList.add('hidden');
}

function gameOver() {
  gameState = 'gameover';
  gameOverAt = performance.now();
  flashColor = 'rgba(255, 50, 50, 0.4)';
  flashTimer = 0.3;
  triggerShake(20);
  spawnParticles(surferX, surferY, 30, 'rgba(255, 80, 80, 0.8)', 250, 200, 0.7, 300);
  spawnParticles(surferX, surferY, 15, BAJA, 200, 150, 0.5, 250);

  const overlay = document.getElementById('overlay');
  overlay.querySelector('h1').textContent = 'WIPEOUT!';
  overlay.querySelector('h2').textContent = 'BAJA WAVE RIDER';
  document.getElementById('finalScore').textContent = 'Score: ' + score;
  document.getElementById('finalDist').textContent = 'Distance: ' + Math.floor(distance) + ' m';
  document.getElementById('startBtn').textContent = 'SURF AGAIN';
  setTimeout(() => overlay.classList.remove('hidden'), 600);
}

document.getElementById('startBtn').addEventListener('click', startGame);

// --- Time of day spinner ---
const timeValueEl = document.getElementById('timeValue');
function setTimeOfDay(t) {
  timeOfDay = t;
  if (timeValueEl) timeValueEl.textContent = t.toUpperCase();
}
function cycleTime(dir) {
  const i = TIMES_OF_DAY.indexOf(timeOfDay);
  const next = TIMES_OF_DAY[(i + dir + TIMES_OF_DAY.length) % TIMES_OF_DAY.length];
  setTimeOfDay(next);
}
document.getElementById('timePrev').addEventListener('click', () => cycleTime(-1));
document.getElementById('timeNext').addEventListener('click', () => cycleTime(1));
setTimeOfDay(timeOfDay);

// ============================================================
// UPDATE
// ============================================================

let lastTime = performance.now();
let lastDt = 0.016;

function update(now) {
  lastDt = Math.min((now - lastTime) / 1000, 0.05);
  const dt = lastDt;
  lastTime = now;

  if (gameState !== 'playing') return;

  time += dt;
  speed = 1.0 + time * 0.025;
  const baseScrollSpeed = 300 * speed;
  const scrollSpeed = isJumping ? baseScrollSpeed * 1.2 : baseScrollSpeed;
  waveOffset += scrollSpeed * dt;
  distance += scrollSpeed * dt * 0.1;
  distantWaveOffset += scrollSpeed * 0.3 * dt;

  surferX = SURFER_X;

  // Update clouds
  clouds.forEach(c => {
    c.x -= scrollSpeed * c.speed * dt / W;
    if (c.x < -0.3) c.x += 1.8;
  });

  // --- Wave height for jump power ---
  canJump = canJumpHere(surferX);

  // --- Surfer physics ---
  const waveYAtSurfer = getWaveY(surferX);
  const surferOnWaveY = waveYAtSurfer - 14;

  if (isJumping) {
    // Apply gravity
    surferVY += GRAVITY * dt;
    surferY += surferVY * dt;

    // Return to wave surface
    if (surferY >= surferOnWaveY) {
      surferY = surferOnWaveY;
      surferVY = 0;
      isJumping = false;
      doubleJumpUsed = false;
      // Landing splash
      spawnParticles(surferX, surferY + 10, 10, 'rgba(99,255,224,0.7)', 100, 80, 0.4, 200);
      triggerShake(3);
    }
  } else {
    // Ride the wave surface
    surferY = surferOnWaveY;
  }

  // Wave slope angle
  const slope = getWaveSlope(surferX);
  if (!isJumping) surferAngle = Math.atan2(-slope, 8);
  // When jumping, surferAngle stays locked to the wave angle at launch

  // Surfer trail
  surferTrail.push({ x: surferX, y: surferY, life: 1 });
  surferTrail.forEach(t => t.life -= dt * 2.5);
  surferTrail = surferTrail.filter(t => t.life > 0);

  // Water spray
  spawnWaterSpray();

  // Speed lines
  updateSpeedLines(dt);

  // Pre-generate obstacles + collectibles up to GENERATION_AHEAD ahead so
  // rotation never causes anything to pop in or out.
  generateObstaclesAhead();
  generateCollectiblesAhead();

  // --- Update obstacles ---
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    ob.worldX = ob.absX - waveOffset;
    if (ob.worldX < -100) { obstacles.splice(i, 1); continue; }

    const ox = ob.worldX;
    const waveAtOb = getWaveY(ox);
    // Sprite is bottom-anchored at oy and sunk into the wave by `sink * imgH`,
    // plus a small vertical bob so it looks like it's riding swells.
    const sink = (OBSTACLE_BY_KIND[ob.kind] || { sink: 0 }).sink;
    const bob = Math.sin(time * 2.4 + ob.bobPhase) * 8;
    const oy = waveAtOb + ob.imgH * sink + bob;
    const centerY = oy - ob.imgH / 2;

    const dx = Math.abs(ox - surferX);
    const dy = Math.abs(centerY - surferY);
    const hw = ob.hitW / 2;
    const hh = ob.hitH / 2;

    if (dx < hw && dy < hh) {
      // Jumping over avoids collision
      if (isJumping && surferY < oy - 20) continue;
      gameOver();
      return;
    }

    // Track closest approach for near-miss (while obstacle is ahead or beside surfer)
    if (ox >= surferX - hw) {
      const gap = Math.sqrt(dx * dx + dy * dy) - Math.sqrt(hw * hw + hh * hh);
      if (ob.closestGap === undefined || gap < ob.closestGap) {
        ob.closestGap = gap;
      }
    }

    // Near miss: triggers once the obstacle has fully passed behind the surfer
    if (!ob.passed && ox < surferX - hw - 5) {
      ob.passed = true;
      if (ob.closestGap !== undefined && ob.closestGap < 20 && nearMissTimer <= 0) {
        bonusScore += 25;
        nearMissTimer = 0.8;
        createPopup('CLOSE CALL! +25', surferX, surferY - 30, ORANGE);
        spawnParticles(surferX, surferY, 6, ORANGE, 60, 40, 0.3, 100);
      }
    }
  }
  nearMissTimer -= dt;

  // --- Spawn air obstacles (max 2 on screen) ---
  seagullTimer -= dt;
  if (seagullTimer <= 0) {
    if (seagulls.length + seagullWarnings.length < 2 && Math.random() < 0.8) queueSeagull();
    seagullTimer = 2 + Math.random() * 2;
  }
  for (let i = seagullWarnings.length - 1; i >= 0; i--) {
    const w = seagullWarnings[i];
    w.timeLeft -= dt;
    if (w.timeLeft <= 0) {
      createSeagull(w.lane, w.variant);
      seagullWarnings.splice(i, 1);
    }
  }

  // --- Update seagulls ---
  for (let i = seagulls.length - 1; i >= 0; i--) {
    const sg = seagulls[i];
    sg.worldX -= (scrollSpeed * sg.speed + 400) * dt;
    sg.wingPhase += dt * 5;
    if (sg.worldX < -60) { seagulls.splice(i, 1); continue; }

    // Collision with surfer
    const dx = Math.abs(sg.worldX - surferX);
    const dy = Math.abs(sg.y - surferY);
    const shw = sg.hitW / 2;
    const shh = sg.hitH / 2;
    if (dx < shw && dy < shh) {
      gameOver();
      return;
    }

    // Track closest approach
    if (sg.worldX >= surferX - shw) {
      const gap = Math.sqrt(dx * dx + dy * dy) - Math.sqrt(shw * shw + shh * shh);
      if (sg.closestGap === undefined || gap < sg.closestGap) {
        sg.closestGap = gap;
      }
    }

    // Near miss after passing
    if (!sg.passed && sg.worldX < surferX - shw - 5) {
      sg.passed = true;
      if (sg.closestGap !== undefined && sg.closestGap < 20 && nearMissTimer <= 0) {
        bonusScore += 25;
        nearMissTimer = 0.8;
        createPopup('CLOSE CALL! +25', surferX, surferY - 30, ORANGE);
        spawnParticles(surferX, surferY, 6, ORANGE, 60, 40, 0.3, 100);
      }
    }
  }

  // --- Update collectibles ---
  for (let i = collectibles.length - 1; i >= 0; i--) {
    const col = collectibles[i];
    col.worldX = col.absX - waveOffset;
    col.rot += dt * 2;
    col.pulsePhase += dt * 4;
    if (col.worldX < -80) { collectibles.splice(i, 1); continue; }

    if (col.collected) {
      col.collectAnim += dt * 4;
      if (col.collectAnim > 1) { collectibles.splice(i, 1); }
      continue;
    }

    const cx = col.worldX;
    const cy = getWaveY(cx) - col.heightAboveWave;
    const ddx = Math.abs(cx - surferX);
    const ddy = Math.abs(cy - surferY);
    if (ddx < col.hitW / 2 && ddy < col.hitH / 2) {
      col.collected = true;
      col.collectAnim = 0;
      bonusScore += col.value;
      const popupColor = col.kind === 'starfish' ? ORANGE : GOLD;
      const particleColor = col.kind === 'starfish' ? ORANGE : BAJA;
      createPopup('+' + col.value, cx, cy - 10, popupColor);
      spawnParticles(cx, cy, 10, particleColor, 100, 80, 0.5, 150);
      triggerShake(col.kind === 'starfish' ? 5 : 3);
    }
  }

  // Particles physics
  particles.forEach(p => {
    p.vy += p.grav * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);

  // Popups
  popups.forEach(p => p.life -= dt);
  popups = popups.filter(p => p.life > 0);

  // Flash timer
  if (flashTimer > 0) flashTimer -= dt;

  // Distance milestones
  const milestoneCheck = [100, 200, 500, 750, 1000, 1500, 2000, 3000, 5000];
  const dist = Math.floor(distance);
  for (const m of milestoneCheck) {
    if (dist >= m && lastMilestone < m) {
      lastMilestone = m;
      createPopup(`${m}m!`, W / 2, H / 2 - 50, BAJA);
      spawnParticles(W / 2, H / 2, 20, BAJA, 200, 150, 0.8, 100);
      spawnParticles(W / 2, H / 2, 15, GOLD, 180, 120, 0.6, 120);
      triggerShake(6);
    }
  }

  // Score
  score = Math.floor(distance) + bonusScore;

  // HUD (distance/speed kept in state for spawn logic; only Score is rendered)
  document.getElementById('scoreVal').textContent = score;
}

// ============================================================
// RENDER
// ============================================================

function render() {
  const shake = getShakeOffset();

  ctx.setTransform(uiScale, 0, 0, uiScale, 0, 0); // logical → physical pixels
  ctx.save();
  ctx.translate(shake.x, shake.y);
  ctx.clearRect(-10, -10, W + 20, H + 20);

  // Background
  drawSky();
  drawStars();
  if (timeOfDay === 'twilight' || timeOfDay === 'night') drawMoon();
  else drawSun();
  drawClouds();
  drawBeach(gameState === 'playing' ? 300 * speed : 30, lastDt);

  // Speed lines
  drawSpeedLines();

  // Wave surface
  drawWave();

  // Surfer trail
  drawSurferTrail();

  // Obstacles (drawn on top of wave so they're always visible)
  obstacles.forEach(ob => {
    const ox = ob.worldX;
    const waveAtOb = getWaveY(ox);
    const sink = (OBSTACLE_BY_KIND[ob.kind] || { sink: 0 }).sink;
    const oy = waveAtOb + ob.imgH * sink;
    const bob = Math.sin(time * 2.4 + ob.bobPhase) * 8;
    drawSpriteVariant(ob.kind, ox, oy + bob);
  });

  // Seagulls (sky obstacles)
  seagulls.forEach(sg => {
    drawSeagull(sg.worldX, sg.y, sg.wingPhase, sg.variant);
  });

  // Incoming-bird warnings: flashing seagull-incoming icon at the right edge
  seagullWarnings.forEach(w => {
    const flash = (Math.sin(time * 14) + 1) / 2;
    if (flash < 0.3) return;
    ctx.save();
    ctx.globalAlpha = 0.55 + 0.45 * flash;
    drawSpriteVariant('seagull-incoming', W - 60, H * w.lane);
    ctx.restore();
  });

  // Collectibles above wave (dewcans + starfish)
  collectibles.forEach(col => {
    const cx = col.worldX;
    const cy = getWaveY(cx) - col.heightAboveWave;
    if (col.collected) {
      const s = 1 + col.collectAnim * 2;
      const a = 1 - col.collectAnim;
      ctx.globalAlpha = a;
      drawCollectible(col, cx, cy, s);
      ctx.globalAlpha = 1;
    } else {
      drawCollectible(col, cx, cy, 1);
    }
  });

  // Jump indicator
  drawJumpIndicator();

  // Surfer
  drawSurfer(surferX, surferY, surferAngle);

  // Particles
  drawParticles();

  // Score popups
  drawPopups();

  // Flash overlay
  if (flashTimer > 0 && flashColor) {
    ctx.fillStyle = flashColor;
    ctx.globalAlpha = flashTimer / 0.3;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ============================================================
// MAIN LOOP
// ============================================================

function gameLoop(now) {
  requestAnimationFrame(gameLoop);
  update(now);
  render();
}

lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>

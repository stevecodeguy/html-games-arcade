<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MTN DEW Blast - Grid Clear</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    background: linear-gradient(135deg, #0A0E27, #0D1B2A);
    font-family: 'Inter', sans-serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas#gameCanvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

  /* Animated background canvas */
  canvas#bgCanvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

  /* Glass HUD */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    z-index: 10;
    pointer-events: none;
    background: rgba(10, 14, 39, 0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(99, 255, 224, 0.2);
  }
  #hud > * { pointer-events: auto; }
  .hud-panel {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .hud-score {
    color: #FFD700;
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
  }
  .hud-label {
    color: rgba(99, 255, 224, 0.7);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  #title-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 900;
    color: #63FFE0;
    text-shadow: 0 0 15px rgba(99, 255, 224, 0.8), 0 0 30px rgba(99, 255, 224, 0.4);
    letter-spacing: 3px;
  }
  #comboDisplay {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    color: #FF6B35;
    text-shadow: 0 0 8px rgba(255, 107, 53, 0.6);
    opacity: 0;
    transition: opacity 0.3s;
  }
  #comboDisplay.active { opacity: 1; }
  #newGameBtn {
    background: linear-gradient(135deg, #63FFE0, #00CED1);
    color: #0A0E27;
    border: none;
    padding: 8px 20px;
    border-radius: 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 0 20px rgba(99, 255, 224, 0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #newGameBtn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(99, 255, 224, 0.5); }
  #newGameBtn:active { transform: scale(0.95); }

  /* Game Over overlay */
  #gameOver {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10, 14, 39, 0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
  }
  #gameOver h1 {
    font-family: 'Orbitron', sans-serif;
    color: #63FFE0;
    font-size: 48px;
    font-weight: 900;
    text-shadow: 0 0 30px rgba(99, 255, 224, 0.8), 0 0 60px rgba(99, 255, 224, 0.4);
    margin-bottom: 10px;
  }
  #gameOver p {
    color: #FFD700;
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    margin-bottom: 30px;
  }
  #gameOverBtn {
    background: linear-gradient(135deg, #63FFE0, #34FFB9);
    color: #0A0E27;
    border: none;
    padding: 14px 40px;
    border-radius: 25px;
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 0 30px rgba(99, 255, 224, 0.4);
    transition: transform 0.15s;
  }
  #gameOverBtn:hover { transform: scale(1.05); }
  #gameOverBtn:active { transform: scale(0.95); }

  /* Floating score popup */
  .score-popup {
    position: fixed;
    font-family: 'Orbitron', sans-serif;
    color: #FFD700;
    font-size: 28px;
    font-weight: 900;
    text-shadow: 0 0 12px rgba(255, 215, 0, 0.8), 0 0 24px rgba(255, 215, 0, 0.4);
    pointer-events: none;
    z-index: 15;
    animation: floatUp 1.2s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(0.5); }
    20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
  }

  /* Mega blast overlay */
  .mega-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-family: 'Orbitron', sans-serif;
    color: #63FFE0;
    font-size: 52px;
    font-weight: 900;
    text-shadow: 0 0 30px rgba(99, 255, 224, 0.9), 0 0 60px rgba(99, 255, 224, 0.5), 0 0 90px rgba(99, 255, 224, 0.3);
    pointer-events: none;
    z-index: 16;
    animation: megaBlast 1.5s ease-out forwards;
    letter-spacing: 6px;
  }
  @keyframes megaBlast {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3) rotate(-5deg); }
    15% { opacity: 1; transform: translate(-50%, -50%) scale(1.3) rotate(2deg); }
    30% { transform: translate(-50%, -50%) scale(1.0) rotate(0deg); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.8) rotate(-1deg); }
  }

  /* Impact flash */
  #flashOverlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(99, 255, 224, 0.3);
    pointer-events: none;
    z-index: 14;
    opacity: 0;
    transition: opacity 0.05s;
  }
  #flashOverlay.active {
    opacity: 1;
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="gameCanvas"></canvas>

<div id="flashOverlay"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-panel">
    <span class="hud-label">Score</span>
    <span class="hud-score" id="score">0</span>
    <span id="comboDisplay">COMBO x1</span>
  </div>
  <div style="text-align:center">
    <div id="title-text">MTN DEW BLAST</div>
    <div style="color:rgba(99,255,224,0.5); font-size:10px; margin-top:2px; letter-spacing:1px;">GRID CLEAR</div>
  </div>
  <button id="newGameBtn" onclick="newGame()">New Game</button>
</div>

<!-- Game Over Screen -->
<div id="gameOver">
  <h1>GAME OVER</h1>
  <p>Score: <span id="finalScore">0</span></p>
  <button id="gameOverBtn" onclick="newGame()">Play Again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// MTN DEW BLAST - GRID CLEAR (Mountain Dew Can Edition)
// Tap/click groups of 2+ same-colored blocks to clear them.
// Blocks fall down and columns collapse left.
// Keyboard: Arrow keys + Space | Touch: Tap blocks
// ============================================================

const COLS = 8;
const ROWS = 10;
const BAJA_TEAL = '#63FFE0';
// Mountain Dew flavors: Baja Blast, Original, Code Red, Voltage, Live Wire
const DEW_FLAVORS = [
  { name: 'BAJA\nBLAST',  bg: '#00B4A0', accent: '#63FFE0', text: '#FFFFFF', rim: '#009988' },
  { name: 'MTN\nDEW',     bg: '#4CAF00', accent: '#8AE233', text: '#FFFFFF', rim: '#3A8F00' },
  { name: 'CODE\nRED',    bg: '#CC0000', accent: '#FF4444', text: '#FFFFFF', rim: '#AA0000' },
  { name: 'VOLT\nAGE',    bg: '#1A0AFF', accent: '#6B5CFF', text: '#FFD700', rim: '#1208CC' },
  { name: 'LIVE\nWIRE',   bg: '#E85D00', accent: '#FFB347', text: '#FFFFFF', rim: '#CC5200' },
];
const BLOCK_HEX_COLORS = DEW_FLAVORS.map(f => f.bg);
const BLOCK_COLORS = DEW_FLAVORS.map(f => parseInt(f.bg.replace('#', '0x')));
const BG_COLOR = 0x0A0E27;
const GRID_LINE_COLOR = 0x1a1f45;

// --- Screen Shake ---
let shakeIntensity = 0;
function triggerShake(intensity) { shakeIntensity = Math.max(shakeIntensity, intensity); }
function updateShake() {
  const canvas = renderer.domElement;
  if (shakeIntensity > 0.3) {
    const ox = (Math.random() - 0.5) * shakeIntensity;
    const oy = (Math.random() - 0.5) * shakeIntensity;
    canvas.style.transform = `translate(${ox}px, ${oy}px)`;
    shakeIntensity *= 0.88;
  } else {
    canvas.style.transform = '';
    shakeIntensity = 0;
  }
}

// --- Particle System ---
let particles = [];
function spawnParticles(worldX, worldY, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.3 + Math.random() * 1.2;
    const size = blockSize * (0.06 + Math.random() * 0.1);
    const geo = new THREE.PlaneGeometry(size, size);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(worldX, worldY, 2);
    scene.add(mesh);
    particles.push({
      mesh,
      vx: Math.cos(angle) * speed * blockSize,
      vy: Math.sin(angle) * speed * blockSize,
      gravity: -2.5 * blockSize,
      life: 1.0,
      decay: 0.7 + Math.random() * 0.8
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= p.decay * dt;
    p.vy += p.gravity * dt;
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.mesh.material.opacity = Math.max(0, p.life);
    p.mesh.scale.setScalar(Math.max(0, p.life));
    if (p.life <= 0) {
      scene.remove(p.mesh);
      p.mesh.geometry.dispose();
      p.mesh.material.dispose();
      particles.splice(i, 1);
    }
  }
}

// --- Mountain Dew Can Texture Generator ---
const blockTextureCache = {};

function createBlockTexture(hexColor) {
  // Find the flavor index from color
  const flavorIdx = BLOCK_HEX_COLORS.indexOf(hexColor);
  const cacheKey = 'can_' + flavorIdx;
  if (blockTextureCache[cacheKey]) return blockTextureCache[cacheKey];

  const flavor = DEW_FLAVORS[flavorIdx] || DEW_FLAVORS[0];
  const size = 256;
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');

  const canX = 28, canY = 16;
  const canW = size - 56, canH = size - 32;
  const canR = 18;

  // Outer glow
  ctx.shadowColor = flavor.accent;
  ctx.shadowBlur = 25;
  ctx.fillStyle = flavor.bg;
  roundRect(ctx, canX, canY, canW, canH, canR);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Can body gradient (metallic look)
  const bodyGrad = ctx.createLinearGradient(canX, 0, canX + canW, 0);
  bodyGrad.addColorStop(0, darkenColor(flavor.bg, 30));
  bodyGrad.addColorStop(0.3, flavor.bg);
  bodyGrad.addColorStop(0.5, lightenColor(flavor.bg, 30));
  bodyGrad.addColorStop(0.7, flavor.bg);
  bodyGrad.addColorStop(1, darkenColor(flavor.bg, 40));
  ctx.fillStyle = bodyGrad;
  roundRect(ctx, canX, canY, canW, canH, canR);
  ctx.fill();

  // Can top rim (silver)
  const rimH = 18;
  const rimGrad = ctx.createLinearGradient(canX, canY, canX + canW, canY);
  rimGrad.addColorStop(0, '#888888');
  rimGrad.addColorStop(0.3, '#CCCCCC');
  rimGrad.addColorStop(0.5, '#EEEEEE');
  rimGrad.addColorStop(0.7, '#CCCCCC');
  rimGrad.addColorStop(1, '#888888');
  ctx.fillStyle = rimGrad;
  roundRect(ctx, canX, canY, canW, rimH, canR);
  ctx.fill();

  // Pull tab circle on rim
  ctx.fillStyle = '#AAAAAA';
  ctx.beginPath();
  ctx.ellipse(canX + canW / 2, canY + rimH / 2, 10, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#777777';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Can bottom rim
  ctx.fillStyle = rimGrad;
  roundRect(ctx, canX, canY + canH - rimH, canW, rimH, canR);
  ctx.fill();

  // Diagonal accent stripe across middle
  ctx.save();
  ctx.beginPath();
  roundRect(ctx, canX, canY, canW, canH, canR);
  ctx.clip();
  ctx.fillStyle = flavor.accent;
  ctx.globalAlpha = 0.35;
  ctx.beginPath();
  ctx.moveTo(canX - 10, canY + canH * 0.4);
  ctx.lineTo(canX + canW + 10, canY + canH * 0.15);
  ctx.lineTo(canX + canW + 10, canY + canH * 0.55);
  ctx.lineTo(canX - 10, canY + canH * 0.8);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1.0;
  ctx.restore();

  // "MTN DEW" small text at top of can body
  ctx.fillStyle = flavor.text;
  ctx.globalAlpha = 0.7;
  ctx.font = 'bold 16px "Orbitron", "Arial Black", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('MTN DEW', canX + canW / 2, canY + rimH + 6);
  ctx.globalAlpha = 1.0;

  // Flavor name - big bold text in center
  ctx.fillStyle = flavor.text;
  ctx.font = 'bold 30px "Orbitron", "Arial Black", Impact, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetY = 2;
  const lines = flavor.name.split('\n');
  const lineH = 32;
  const startY = canY + canH / 2 + 4 - ((lines.length - 1) * lineH) / 2;
  lines.forEach((line, i) => {
    ctx.fillText(line, canX + canW / 2, startY + i * lineH);
  });
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // Lightning bolt icon below text
  const boltX = canX + canW / 2;
  const boltY = startY + lines.length * lineH + 4;
  ctx.fillStyle = flavor.text;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(boltX - 6, boltY - 8);
  ctx.lineTo(boltX + 2, boltY - 1);
  ctx.lineTo(boltX - 2, boltY - 1);
  ctx.lineTo(boltX + 6, boltY + 8);
  ctx.lineTo(boltX - 2, boltY + 1);
  ctx.lineTo(boltX + 2, boltY + 1);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1.0;

  // Specular highlight (vertical shine on left side)
  const specGrad = ctx.createLinearGradient(canX, 0, canX + canW * 0.4, 0);
  specGrad.addColorStop(0, 'rgba(255,255,255,0)');
  specGrad.addColorStop(0.3, 'rgba(255,255,255,0.18)');
  specGrad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
  specGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = specGrad;
  roundRect(ctx, canX, canY + rimH, canW, canH - rimH * 2, 0);
  ctx.fill();

  // Water droplets (condensation)
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  for (let i = 0; i < 6; i++) {
    const dx = canX + 20 + Math.random() * (canW - 40);
    const dy = canY + rimH + 10 + Math.random() * (canH - rimH * 2 - 20);
    const dr = 2 + Math.random() * 3;
    ctx.beginPath();
    ctx.arc(dx, dy, dr, 0, Math.PI * 2);
    ctx.fill();
  }

  // Outer edge border
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 2;
  roundRect(ctx, canX, canY, canW, canH, canR);
  ctx.stroke();

  const texture = new THREE.CanvasTexture(c);
  texture.minFilter = THREE.LinearFilter;
  blockTextureCache[cacheKey] = texture;
  return texture;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function lightenColor(hex, amount) {
  let r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  r = Math.min(255, r + amount); g = Math.min(255, g + amount); b = Math.min(255, b + amount);
  return `rgb(${r},${g},${b})`;
}
function darkenColor(hex, amount) {
  let r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  r = Math.max(0, r - amount); g = Math.max(0, g - amount); b = Math.max(0, b - amount);
  return `rgb(${r},${g},${b})`;
}

// --- Animated Background ---
let bgCanvas, bgCtx;
let bgParticles = [];
let waveOffset = 0;
function initBackground() {
  bgCanvas = document.getElementById('bgCanvas');
  bgCtx = bgCanvas.getContext('2d');
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  bgParticles = [];
  for (let i = 0; i < 40; i++) {
    bgParticles.push({
      x: Math.random() * bgCanvas.width,
      y: Math.random() * bgCanvas.height,
      size: 1 + Math.random() * 3,
      speed: 0.2 + Math.random() * 0.6,
      alpha: 0.1 + Math.random() * 0.3,
      wobble: Math.random() * Math.PI * 2
    });
  }
}
function drawBackground(dt) {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

  // Dark ocean gradient
  const grad = bgCtx.createLinearGradient(0, 0, 0, bgCanvas.height);
  grad.addColorStop(0, '#0A0E27');
  grad.addColorStop(1, '#0D1B2A');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

  // Subtle wave lines
  waveOffset += dt * 0.3;
  for (let w = 0; w < 5; w++) {
    bgCtx.beginPath();
    bgCtx.strokeStyle = `rgba(99, 255, 224, ${0.03 + w * 0.01})`;
    bgCtx.lineWidth = 1;
    const baseY = bgCanvas.height * (0.2 + w * 0.15);
    for (let x = 0; x <= bgCanvas.width; x += 4) {
      const y = baseY + Math.sin(x * 0.005 + waveOffset + w * 0.8) * 20 + Math.sin(x * 0.01 + waveOffset * 0.7) * 10;
      if (x === 0) bgCtx.moveTo(x, y);
      else bgCtx.lineTo(x, y);
    }
    bgCtx.stroke();
  }

  // Floating teal particles / bubbles
  bgParticles.forEach(p => {
    p.y -= p.speed;
    p.wobble += 0.02;
    p.x += Math.sin(p.wobble) * 0.3;
    if (p.y < -10) { p.y = bgCanvas.height + 10; p.x = Math.random() * bgCanvas.width; }
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(99, 255, 224, ${p.alpha})`;
    bgCtx.fill();
  });
}

// --- Three.js Setup ---
let scene, camera, renderer;
let blockSize, gridOffsetX, gridOffsetY;
let grid = [];
let blockMeshes = [];
let cursorMesh;
let cursorX = 0, cursorY = 0;
let score = 0;
let gameActive = true;
let animating = false;
let highlightedGroup = [];
let highlightMeshes = [];
let pulseTime = 0;

// Combo system
let comboMultiplier = 0;
let lastClearTime = 0;
const COMBO_WINDOW = 2000; // ms

// Animation system for falling blocks
let fallingBlocks = [];
let popAnimations = [];

initBackground();
initThree();
newGame();
let lastFrameTime = performance.now();
animate();

function initThree() {
  scene = new THREE.Scene();
  // Transparent so background canvas shows through
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true, alpha: true });
  renderer.setClearColor(0x000000, 0);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const aspect = window.innerWidth / window.innerHeight;
  camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 10);
  camera.position.z = 5;

  window.addEventListener('resize', onResize);
  renderer.domElement.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('keydown', onKeyDown);

  recalcSizes();
}

function recalcSizes() {
  const aspect = window.innerWidth / window.innerHeight;
  camera.left = -aspect;
  camera.right = aspect;
  camera.top = 1;
  camera.bottom = -1;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);

  const viewW = 2 * aspect;
  const viewH = 2;
  const pad = 0.12;
  const topPad = 0.15;
  const availW = viewW - 2 * pad;
  const availH = viewH - pad - topPad;
  blockSize = Math.min(availW / COLS, availH / ROWS);
  gridOffsetX = -blockSize * COLS / 2;
  gridOffsetY = -blockSize * ROWS / 2 - 0.03;
}

function onResize() {
  recalcSizes();
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  rebuildMeshes();
}

// --- Game Logic ---

function newGame() {
  score = 0;
  comboMultiplier = 0;
  lastClearTime = 0;
  gameActive = true;
  animating = false;
  cursorX = 0;
  cursorY = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('gameOver').style.display = 'none';
  document.getElementById('comboDisplay').classList.remove('active');

  clearScene();
  particles = [];
  fallingBlocks = [];
  popAnimations = [];

  grid = [];
  for (let c = 0; c < COLS; c++) {
    grid[c] = [];
    for (let r = 0; r < ROWS; r++) {
      const colorIdx = Math.floor(Math.random() * BLOCK_COLORS.length);
      grid[c][r] = { color: colorIdx, mesh: null };
    }
  }

  drawGridLines();
  rebuildMeshes();
  createCursor();
  updateCursorPosition();
}

function clearScene() {
  while (scene.children.length > 0) scene.remove(scene.children[0]);
  blockMeshes = [];
  highlightMeshes = [];
}

function drawGridLines() {
  const mat = new THREE.LineBasicMaterial({ color: GRID_LINE_COLOR, transparent: true, opacity: 0.4 });
  for (let c = 0; c <= COLS; c++) {
    const x = gridOffsetX + c * blockSize;
    const geo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, gridOffsetY, 0),
      new THREE.Vector3(x, gridOffsetY + ROWS * blockSize, 0)
    ]);
    scene.add(new THREE.Line(geo, mat));
  }
  for (let r = 0; r <= ROWS; r++) {
    const y = gridOffsetY + r * blockSize;
    const geo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(gridOffsetX, y, 0),
      new THREE.Vector3(gridOffsetX + COLS * blockSize, y, 0)
    ]);
    scene.add(new THREE.Line(geo, mat));
  }

  // Border glow
  const borderMat = new THREE.LineBasicMaterial({ color: 0x63FFE0, transparent: true, opacity: 0.3 });
  const borderGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(gridOffsetX, gridOffsetY, 0),
    new THREE.Vector3(gridOffsetX + COLS * blockSize, gridOffsetY, 0),
    new THREE.Vector3(gridOffsetX + COLS * blockSize, gridOffsetY + ROWS * blockSize, 0),
    new THREE.Vector3(gridOffsetX, gridOffsetY + ROWS * blockSize, 0),
    new THREE.Vector3(gridOffsetX, gridOffsetY, 0)
  ]);
  scene.add(new THREE.Line(borderGeo, borderMat));
}

function rebuildMeshes() {
  blockMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
  blockMeshes = [];
  highlightMeshes.forEach(m => { scene.remove(m); });
  highlightMeshes = [];

  const gap = blockSize * 0.02;
  const bsInner = blockSize - gap * 2;

  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      if (!grid[c] || !grid[c][r]) continue;
      const block = grid[c][r];
      const tex = createBlockTexture(BLOCK_HEX_COLORS[block.color]);
      const geo = new THREE.PlaneGeometry(bsInner, bsInner);
      const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(
        gridOffsetX + c * blockSize + blockSize / 2,
        gridOffsetY + r * blockSize + blockSize / 2,
        0
      );
      mesh.userData = { col: c, row: r, targetY: gridOffsetY + r * blockSize + blockSize / 2 };
      scene.add(mesh);
      block.mesh = mesh;
      blockMeshes.push(mesh);
    }
  }
}

function createCursor() {
  if (cursorMesh) scene.remove(cursorMesh);
  const geo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(blockSize * 0.94, blockSize * 0.94));
  const mat = new THREE.LineBasicMaterial({ color: 0x63FFE0, linewidth: 2, transparent: true, opacity: 0.9 });
  cursorMesh = new THREE.LineSegments(geo, mat);
  cursorMesh.position.z = 1;
  scene.add(cursorMesh);
}

function updateCursorPosition() {
  if (!cursorMesh) return;
  cursorMesh.position.set(
    gridOffsetX + cursorX * blockSize + blockSize / 2,
    gridOffsetY + cursorY * blockSize + blockSize / 2,
    1
  );
  updateHighlight(cursorX, cursorY);
}

// --- Group Finding (flood fill) ---

function findGroup(c, r) {
  if (!grid[c] || !grid[c][r]) return [];
  const targetColor = grid[c][r].color;
  const visited = new Set();
  const group = [];
  const stack = [[c, r]];
  while (stack.length > 0) {
    const [cc, rr] = stack.pop();
    const key = cc + ',' + rr;
    if (visited.has(key)) continue;
    if (cc < 0 || cc >= COLS || rr < 0 || rr >= ROWS) continue;
    if (!grid[cc] || !grid[cc][rr]) continue;
    if (grid[cc][rr].color !== targetColor) continue;
    visited.add(key);
    group.push({ col: cc, row: rr });
    stack.push([cc - 1, rr], [cc + 1, rr], [cc, rr - 1], [cc, rr + 1]);
  }
  return group;
}

function updateHighlight(c, r) {
  highlightMeshes.forEach(m => scene.remove(m));
  highlightMeshes = [];
  highlightedGroup = [];

  if (!grid[c] || !grid[c][r]) return;
  const group = findGroup(c, r);
  if (group.length < 2) return;

  highlightedGroup = group;
}

// --- Clearing & Gravity ---

function clearGroup(group) {
  if (group.length < 2 || animating) return;
  animating = true;

  const now = performance.now();

  // Combo system
  if (now - lastClearTime < COMBO_WINDOW) {
    comboMultiplier++;
  } else {
    comboMultiplier = 1;
  }
  lastClearTime = now;

  const n = group.length;
  const basePoints = n * (n - 1) * 5;
  const points = basePoints * comboMultiplier;
  score += points;
  document.getElementById('score').textContent = score;

  // Update combo display
  if (comboMultiplier > 1) {
    const cd = document.getElementById('comboDisplay');
    cd.textContent = `COMBO x${comboMultiplier}`;
    cd.classList.add('active');
    cd.style.fontSize = Math.min(12 + comboMultiplier * 3, 28) + 'px';
  }

  showScorePopup(group, points);

  // Big group effects
  if (n >= 5) {
    triggerShake(8 + n);
    triggerFlash();
  }
  if (n >= 8) {
    showMegaBlast();
    triggerShake(20);
  }

  // Combo 4+ flash
  if (comboMultiplier >= 4) {
    triggerFlash();
    triggerShake(12);
  }

  // Pop animation + particles for each block
  group.forEach(({ col, row }) => {
    const block = grid[col][row];
    if (block && block.mesh) {
      const wx = block.mesh.position.x;
      const wy = block.mesh.position.y;
      // Spawn particles
      // Use accent color for particles for more pop
      const accentHex = DEW_FLAVORS[block.color].accent;
      const accentInt = parseInt(accentHex.replace('#', ''), 16);
      spawnParticles(wx, wy, accentInt, 10 + Math.floor(Math.random() * 8));
      // Start pop animation (squash-stretch before removing)
      popAnimations.push({
        mesh: block.mesh,
        time: 0,
        duration: 0.2,
        col, row
      });
    }
    grid[col][row] = null;
  });

  // Schedule gravity after pop animation
  setTimeout(() => {
    // Clean up pop meshes
    popAnimations.forEach(p => {
      if (p.mesh.parent) scene.remove(p.mesh);
    });
    popAnimations = [];

    applyGravity();
    collapseColumns();
    rebuildMeshes();
    createCursor();
    cursorX = Math.min(cursorX, COLS - 1);
    cursorY = Math.min(cursorY, ROWS - 1);
    updateCursorPosition();

    // Animate falling blocks
    startFallAnimation(() => {
      animating = false;
      if (!hasValidMoves()) {
        gameActive = false;
        document.getElementById('finalScore').textContent = score;
        document.getElementById('gameOver').style.display = 'flex';
      }
    });
  }, 220);
}

function applyGravity() {
  for (let c = 0; c < COLS; c++) {
    let writeIdx = 0;
    for (let r = 0; r < ROWS; r++) {
      if (grid[c][r] !== null) {
        grid[c][writeIdx] = grid[c][r];
        if (writeIdx !== r) grid[c][r] = null;
        writeIdx++;
      }
    }
    for (let r = writeIdx; r < ROWS; r++) {
      grid[c][r] = null;
    }
  }
}

function collapseColumns() {
  let writeCol = 0;
  for (let c = 0; c < COLS; c++) {
    let empty = true;
    for (let r = 0; r < ROWS; r++) {
      if (grid[c][r] !== null) { empty = false; break; }
    }
    if (!empty) {
      if (writeCol !== c) {
        grid[writeCol] = grid[c];
        grid[c] = [];
        for (let r = 0; r < ROWS; r++) grid[c].push(null);
      }
      writeCol++;
    }
  }
  for (let c = writeCol; c < COLS; c++) {
    grid[c] = [];
    for (let r = 0; r < ROWS; r++) grid[c].push(null);
  }
}

function startFallAnimation(callback) {
  // Set all blocks slightly above their target and animate down
  let anyFalling = false;
  blockMeshes.forEach(m => {
    const targetY = m.userData.targetY;
    // Start blocks from a bit higher for falling effect
    m.position.y = targetY + blockSize * 1.5;
    anyFalling = true;
  });
  if (!anyFalling) {
    callback();
    return;
  }
  const startTime = performance.now();
  const duration = 300;

  function animFall() {
    const elapsed = performance.now() - startTime;
    const t = Math.min(1, elapsed / duration);
    // Ease-out bounce
    const eased = 1 - Math.pow(1 - t, 3);
    blockMeshes.forEach(m => {
      const targetY = m.userData.targetY;
      const startY = targetY + blockSize * 1.5;
      m.position.y = startY + (targetY - startY) * eased;
    });
    if (t < 1) {
      requestAnimationFrame(animFall);
    } else {
      blockMeshes.forEach(m => { m.position.y = m.userData.targetY; });
      callback();
    }
  }
  requestAnimationFrame(animFall);
}

function hasValidMoves() {
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      if (!grid[c][r]) continue;
      const group = findGroup(c, r);
      if (group.length >= 2) return true;
    }
  }
  return false;
}

function showScorePopup(group, points) {
  let sx = 0, sy = 0;
  group.forEach(({ col, row }) => {
    const worldX = gridOffsetX + col * blockSize + blockSize / 2;
    const worldY = gridOffsetY + row * blockSize + blockSize / 2;
    const v = new THREE.Vector3(worldX, worldY, 0).project(camera);
    sx += (v.x + 1) / 2 * window.innerWidth;
    sy += (1 - (v.y + 1) / 2) * window.innerHeight;
  });
  sx /= group.length;
  sy /= group.length;

  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = '+' + points;
  if (comboMultiplier > 1) el.textContent += ` (x${comboMultiplier})`;
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function showMegaBlast() {
  const el = document.createElement('div');
  el.className = 'mega-text';
  el.textContent = 'DEW BLAST!';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

function triggerFlash() {
  const overlay = document.getElementById('flashOverlay');
  overlay.classList.add('active');
  setTimeout(() => overlay.classList.remove('active'), 80);
}

// --- Input Handling ---

function onPointerDown(e) {
  if (!gameActive || animating) return;
  e.preventDefault();

  const rect = renderer.domElement.getBoundingClientRect();
  const ndcX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  const ndcY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  const worldX = ndcX * (camera.right - camera.left) / 2 + (camera.right + camera.left) / 2;
  const worldY = ndcY * (camera.top - camera.bottom) / 2 + (camera.top + camera.bottom) / 2;

  const col = Math.floor((worldX - gridOffsetX) / blockSize);
  const row = Math.floor((worldY - gridOffsetY) / blockSize);

  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;
  if (!grid[col][row]) return;

  cursorX = col;
  cursorY = row;
  updateCursorPosition();

  const group = findGroup(col, row);
  if (group.length >= 2) {
    clearGroup(group);
  }
}

function onKeyDown(e) {
  if (!gameActive || animating) return;

  switch (e.key) {
    case 'ArrowLeft':
      cursorX = Math.max(0, cursorX - 1);
      updateCursorPosition();
      e.preventDefault();
      break;
    case 'ArrowRight':
      cursorX = Math.min(COLS - 1, cursorX + 1);
      updateCursorPosition();
      e.preventDefault();
      break;
    case 'ArrowDown':
      cursorY = Math.max(0, cursorY - 1);
      updateCursorPosition();
      e.preventDefault();
      break;
    case 'ArrowUp':
      cursorY = Math.min(ROWS - 1, cursorY + 1);
      updateCursorPosition();
      e.preventDefault();
      break;
    case ' ':
      e.preventDefault();
      if (highlightedGroup.length >= 2) {
        clearGroup(highlightedGroup);
      }
      break;
  }
}

// --- Render Loop ---

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - lastFrameTime) / 1000, 0.05);
  lastFrameTime = now;

  pulseTime += dt;

  // Background
  drawBackground(dt);

  // Update particles
  updateParticles(dt);

  // Update shake
  updateShake();

  // Pop animations (squash-stretch)
  popAnimations.forEach(p => {
    p.time += dt;
    const t = p.time / p.duration;
    if (t < 1 && p.mesh.parent) {
      // Squash then stretch
      const scaleX = 1 + Math.sin(t * Math.PI) * 0.4;
      const scaleY = 1 - Math.sin(t * Math.PI) * 0.3;
      p.mesh.scale.set(scaleX, scaleY, 1);
      p.mesh.material.opacity = 1 - t;
    }
  });

  // Pulsing highlight on highlighted group
  if (highlightedGroup.length >= 2) {
    const pulse = 0.15 + Math.sin(pulseTime * 4) * 0.1;
    // Rebuild highlight overlays
    highlightMeshes.forEach(m => scene.remove(m));
    highlightMeshes = [];
    const gap = blockSize * 0.04;
    const bsInner = blockSize - gap * 2;
    const geo = new THREE.PlaneGeometry(bsInner, bsInner);
    const mat = new THREE.MeshBasicMaterial({ color: 0x63FFE0, transparent: true, opacity: pulse });

    highlightedGroup.forEach(({ col, row }) => {
      if (!grid[col] || !grid[col][row]) return;
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(
        gridOffsetX + col * blockSize + blockSize / 2,
        gridOffsetY + row * blockSize + blockSize / 2,
        0.5
      );
      scene.add(mesh);
      highlightMeshes.push(mesh);
    });
  }

  // Pulse cursor
  if (cursorMesh) {
    cursorMesh.material.opacity = 0.5 + Math.sin(pulseTime * 5) * 0.4;
  }

  // Combo display fade
  if (performance.now() - lastClearTime > COMBO_WINDOW && comboMultiplier > 0) {
    comboMultiplier = 0;
    document.getElementById('comboDisplay').classList.remove('active');
  }

  renderer.render(scene, camera);
}
</script>
</body>
</html>
